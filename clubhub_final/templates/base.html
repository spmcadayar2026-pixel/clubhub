<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClubHub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12; --surface: #16161d; --surface2: #1e1e28;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6af7; --accent2: #f7a26a; --accent3: #6af7c3;
      --text: #e8e8f0; --muted: #7a7a8c;
      --success: #6af7a2; --warning: #f7dc6a; --danger: #f76a6a;
      --radius: 12px;
      --hf: 'Syne', sans-serif; --bf: 'DM Sans', sans-serif;
    }
    body { font-family: var(--bf); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,18,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .brand { font-family: var(--hf); font-size: 1.2rem; font-weight: 800; text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a { color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 0.87rem; font-weight: 500; transition: all .15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

    main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .flashes { margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 8px; }
    .flash { padding: 10px 14px; border-radius: var(--radius); font-size: 0.88rem; border: 1px solid transparent; }
    .flash.success { background: rgba(106,247,162,.1); border-color: rgba(106,247,162,.25); color: var(--success); }
    .flash.error   { background: rgba(247,106,106,.1); border-color: rgba(247,106,106,.25); color: var(--danger); }
    .flash.warning { background: rgba(247,220,106,.1); border-color: rgba(247,220,106,.25); color: var(--warning); }
    .flash.info    { background: rgba(124,106,247,.1); border-color: rgba(124,106,247,.25); color: var(--accent); }

    h1 { font-family: var(--hf); font-size: 1.9rem; font-weight: 800; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: border-color .2s; }
    .card:hover { border-color: rgba(124,106,247,.3); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }

    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .stat-val { font-family: var(--hf); font-size: 2rem; font-weight: 800; line-height: 1; }

    .sec-title { font-family: var(--hf); font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: space-between; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px;
      border: none; font-family: var(--bf); font-size: 0.87rem; font-weight: 500; cursor: pointer;
      text-decoration: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6855e0; transform: translateY(-1px); }
    .btn-sm { padding: 5px 11px; font-size: 0.8rem; }
    .btn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sec:hover { border-color: var(--accent); color: var(--accent); }
    .btn-del { background: rgba(247,106,106,.12); color: var(--danger); border: 1px solid rgba(247,106,106,.25); }
    .btn-del:hover { background: rgba(247,106,106,.22); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .fg { display: flex; flex-direction: column; gap: 6px; }
    .fg.full { grid-column: 1 / -1; }
    label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
    input, textarea, select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 9px 12px; font-family: var(--bf); font-size: 0.9rem;
      width: 100%; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,.15); }
    textarea { resize: vertical; min-height: 100px; }
    select option { background: var(--surface2); }

    .tw { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); }
    th { padding: 10px 14px; text-align: left; font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
    td { padding: 12px 14px; border-top: 1px solid var(--border); font-size: 0.88rem; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.73rem; font-weight: 600; }
    .b-green  { background: rgba(106,247,162,.12); color: var(--success); }
    .b-yellow { background: rgba(247,220,106,.12); color: var(--warning); }
    .b-purple { background: rgba(124,106,247,.12); color: var(--accent); }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty .ico { font-size: 2.5rem; margin-bottom: 10px; }

    @media(max-width:640px) {
      .form-row, .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
      .nav-links a { padding: 6px 8px; font-size: 0.8rem; }
      main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="brand">◈ ClubHub</a>
  <div class="nav-links">
    <a href="/"           class="{{ 'active' if request.endpoint=='home' }}">Home</a>
    <a href="/events"     class="{{ 'active' if 'event' in (request.endpoint or '') }}">Events</a>
    <a href="/payments"   class="{{ 'active' if 'payment' in (request.endpoint or '') }}">Payments</a>
    <a href="/newsletter" class="{{ 'active' if 'newsletter' in (request.endpoint or '') or 'subscribe' in (request.endpoint or '') }}">Newsletter</a>
    <a href="/feedback"   class="{{ 'active' if 'feedback' in (request.endpoint or '') }}">Feedback</a>
  </div>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
