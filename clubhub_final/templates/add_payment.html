{% extends "base.html" %}
{% block title %}Record Payment — ClubHub{% endblock %}
{% block content %}
<h1>Record Payment</h1><p class="sub">Log a payment or pending due</p>
<div class="card" style="max-width:580px;">
  <form method="POST" action="/payments/add">
    <div class="form-row" style="margin-bottom:1rem;">
      <div class="fg"><label>Member Name *</label><input type="text" name="member_name" placeholder="e.g. Ravi Kumar" required></div>
      <div class="fg"><label>Amount (₹) *</label><input type="number" name="amount" placeholder="500" min="0" step="0.01" required></div>
      <div class="fg"><label>Purpose *</label><input type="text" name="purpose" placeholder="e.g. Monthly Dues" required></div>
      <div class="fg"><label>Date *</label><input type="date" name="date" required></div>
      <div class="fg"><label>Status</label>
        <select name="status"><option value="Paid">Paid</option><option value="Pending">Pending</option></select>
      </div>
      <div class="fg"><label>Notes</label><input type="text" name="notes" placeholder="Optional"></div>
    </div>
    <div style="display:flex;gap:.75rem;">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/payments" class="btn btn-sec">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
